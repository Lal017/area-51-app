type PushToken
  @model
  @auth(rules: [
    {allow: owner},
    {allow: groups, groups: ["Admins"], operations: [read, create, update, delete]},
    {allow: groups, groups: ["Customers"], operations: [read]}
  ])
{
  id: ID!
  pushToken: String!
  access: String!
  name: String!
  email: AWSEmail!
  phone: AWSPhone!
}
 