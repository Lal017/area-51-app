type User
  @model
  @auth(rules: [
    {allow: owner},
    {allow: groups, groups: ["Admins"], operations: [read, create, update, delete]},
    {allow: groups, groups: ["TowDrivers"], operations: [read]},
    {allow: private, provider: identityPool, operations: [read]}
  ])
{
  id: ID!
  identityId: ID!       # used for amplify/storage
  access: String!
  firstName: String!
  lastName: String!
  email: AWSEmail!
  phone: AWSPhone!
  pushToken: String!
  vehicles: [Vehicle] @hasMany(indexName: "byUser", fields: ["id"])
  appointments: [Appointment] @hasMany(indexName: "byUser", fields: ["id"])
  towRequests: [TowRequest] @hasMany(indexName: "byUser", fields: ["id"])
  driverId: ID          # Tow Drivers ID for accepting tow requests
}

type Vehicle
  @model
  @auth(rules: [
    {allow: owner},
    {allow: groups, groups: ["Admins"], operations: [read, create, update, delete]},
    {allow: groups, groups: ["TowDrivers"], operations: [read]},
    {allow: private, provider: identityPool, operations: [read]}
  ])
{
  id: ID!
  year: Int!
  make: String!
  model: String!
  color: String!
  plate: String
  vin: String
  readyForPickup: Boolean
  userId: ID! @index(name: "byUser")
  user: User @belongsTo(fields: ["userId"])
}

type Appointment
  @model
  @auth(rules: [
    {allow: owner},
    {allow: groups, groups: ["Admins"], operations: [read, create, update, delete]},
    {allow: private, provider: identityPool, operations: [read]}
  ])
{
  id: ID!
  date: AWSDate!
  time: AWSTime!
  service: String!
  notes: String
  userId: ID! @index(name: "byUser")
  user: User @belongsTo(fields: ["userId"])
  vehicleId: ID!
  vehicle: Vehicle @hasOne(fields: ["vehicleId"])
}

enum TowRequestStatus {
  REQUESTED
  CANCELLED
  IN_PROGRESS
  COMPLETED
}

type TowRequest
  @model
  @auth(rules: [
    {allow: owner},
    {allow: groups, groups: ["Admins"], operations: [read, create, update, delete]},
    {allow: groups, groups: ["TowDrivers"], operations: [read, update]},
    {allow: private, provider: identityPool, operations: [read, update]}
  ])
{
  id: ID!
  userId: ID! @index(name: "byUser")
  user: User @belongsTo(fields: ["userId"])
  vehicleId: ID!
  vehicle: Vehicle @hasOne(fields: ["vehicleId"])
  status: TowRequestStatus!
  latitude: Float!
  longitude: Float!
  canRun: Boolean!
  canRoll: Boolean!
  keyIncluded: Boolean!
  isObstructed: Boolean!
  notes: String
  waitTime: Int
  driverId: ID
  driverFirstName: String
  driverPhoneNumber: AWSPhone
  acceptedAt: AWSDateTime
}